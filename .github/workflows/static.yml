name: CI/CD React Vite to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 1. Trigger: when workflow runs
on:
  push:
    branches: ["main"] # Run automatically when code is pushed to main branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Permissions for GitHub Actions token to allow deployment to GitHub Pages
permissions:
  contents: read # Allows workflow to read repo content
  pages: write # Allows workflow to deploy to GitHub Pages
  id-token: write # Needed for authentication (optional)

# Concurrency: only 1 workflow runs at a time
concurrency:
  group: "react-vite-pages" # Name of the concurrency group
  cancel-in-progress: true # Cancel previous workflow runs if new one starts

# 2. JOBS definition
jobs:
  # 1st TEST JOB
  test: # job ID unique
    name: Run Lint & Unit Tests # Display name of the job
    runs-on: ubuntu-latest # Run this job on GitHub-hosted Linux virtual machine

    # Steps: sequential commands to run inside the job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Downloads your repository into the VM

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "package-lock.json"
        # Installs Node.js, caches node_modules for faster builds

      - name: Install dependencies
        run: npm install # Install all packages in package.json

      - name: Run ESLint
        run: npm run lint # Lint the codebase for syntax/quality issues

      - name: Run Tests (CI mode with coverage)
        run: npm run test:ci # Run Vitest

  # 2nd BUILD & DEPLOY JOB
  build-deploy: # job ID unique
    name: Build & Deploy to GitHub Pages
    # Choose the runner OS
    runs-on: ubuntu-latest
    needs: test # Only runs if test job passes

    # Environment metadata
    environment:
      name: github-pages # GitHub environment name
      url: ${{ steps.deployment.outputs.page_url }} # GitHub Pages URL

    steps:
      # 3a. Step: checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        # Get repo files in this job's VM

      # 3b. Step: setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # current local version
          cache: "npm" # speeds up builds by caching node_modules

      # 3c. Step: install dependencies
      - name: Install dependencies
        run: npm install # Install all npm packages for build

      # 3d. Step: build the project
      - name: Build project
        run: npm run build
        # Creates dist/ folder with production-ready static files

      # 3e. Step: setup GitHub Pages environment
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        # Prepares GitHub Pages for artifact deployment

      # 3f. Step: upload built site artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"
          # Upload the production build folder (dist) to GitHub Pages workflow
          # tells GitHub which files to deploy

      # 3g. Step: deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment # reference to output url
        uses: actions/deploy-pages@v4
        # Deploy the uploaded dist folder to GitHub Pages
